services:
  backend:
    build:
      context: .
    env_file:
      - .env
    environment:
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../pdf-excel-ai-frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "4200:80"
    depends_on:
      - backend